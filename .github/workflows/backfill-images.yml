name: Backfill Article Images

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual trigger

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install automation dependencies
        run: cd automation && npm install

      - name: Run image backfill
        env:
          UNSPLASH_ACCESS_KEY: ${{ vars.UNSPLASH_ACCESS_KEY }}
          DB_PATH: ${{ github.workspace }}/db/articles.db
          BACKFILL_BATCH: '40'
        run: node automation/backfill-images.js

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f db/articles.db
          git diff --staged --quiet || git commit -m "chore: backfill images $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
