name: Backfill Translations

on:
  schedule:
    - cron: '0 11 * * *'   # daily at 11am UTC (after YouTube backfill)
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install automation dependencies
        run: cd automation && npm install

      - name: Run translation backfill
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DB_PATH: ${{ github.workspace }}/db/articles.db
          BACKFILL_BATCH: '50'
        run: node automation/backfill-translations.js

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/articles.db
          git diff --staged --quiet || git commit -m "chore: backfill translations $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
