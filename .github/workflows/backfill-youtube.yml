name: Backfill YouTube Videos

on:
  schedule:
    - cron: '0 10 * * *'   # daily at 10am UTC
  workflow_dispatch:         # allow manual run

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install automation dependencies
        run: cd automation && npm install

      - name: Run YouTube backfill
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DB_PATH: ${{ github.workspace }}/db/articles.db
          BACKFILL_BATCH: '90'
        run: node automation/backfill-youtube.js

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/articles.db
          git diff --staged --quiet || git commit -m "chore: backfill youtube videos $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
