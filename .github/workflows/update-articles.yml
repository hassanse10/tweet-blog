name: Update Articles

on:
  schedule:
    - cron: '0 8 * * *'  # once daily at 8:00 UTC
  workflow_dispatch:         # allow manual run from GitHub UI

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install automation dependencies
        run: cd automation && npm install

      - name: Run automation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DB_PATH: ${{ github.workspace }}/db/articles.db
        run: node automation/index.js

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f db/articles.db
          git diff --staged --quiet || git commit -m "chore: update articles db $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main
          git push
